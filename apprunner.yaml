version: 1.0
runtime: nodejs22

build:
  commands:
    build:
      - npm install --prefix backend

run:
  runtime: nodejs22
  command: node backend/server.js
  network:
    port: 3000
  # --- Instance sizing for ~800 concurrent users ---
  # Each instance handles up to 100 concurrent requests.
  # App Runner auto-scales: 800 users / 100 per instance = ~8 instances max.
  # 8 instances × 20 DB connections = 160 total connections (safe for RDS).
  instance_configuration:
    cpu: 1 vCPU
    memory: 2 GB
  scaling_configuration:
    max_concurrency: 100        # Spin up new instance when this is reached
    min_size: 1                 # Always keep at least 1 instance warm
    max_size: 10                # Cap at 10 instances (handles 1000 users)
  env:
    - name: NODE_ENV
      value: "production"
    - name: DB_HOST
      value: "database-1.cd8g6ywscrnp.ap-southeast-1.rds.amazonaws.com"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "postgres"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASSWORD
      value: DipCircuitlyPg2026!

