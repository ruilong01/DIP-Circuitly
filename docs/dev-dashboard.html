<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuitly | Live Developer Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #c084fc;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(192, 132, 252, 0.1) 0px, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .status-online .status-dot { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-offline .status-dot { background: var(--error); box-shadow: 0 0 10px var(--error); }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            padding-bottom: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-id { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--primary); }

        .log-container {
            height: 600px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding-right: 0.5rem;
        }

        .log-item {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            border-left: 3px solid var(--border);
        }

        .log-item.user_login { border-left-color: var(--success); }
        .log-item.quiz_completed { border-left-color: var(--accent); }
        .log-item.error { border-left-color: var(--error); }

        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .log-name { font-weight: 600; color: var(--text); }
        .log-time { color: var(--text-muted); font-size: 0.75rem; }
        .log-meta { font-family: 'JetBrains Mono', monospace; color: var(--text-muted); opacity: 0.8; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover { opacity: 0.9; }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Circuitly Live Visualizer</h1>
            <div id="healthStatus" class="status-badge">
                <span class="status-dot"></span>
                <span id="statusText">Checking systems...</span>
            </div>
        </header>

        <div class="grid">
            <!-- Left Column: User Data -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Live Student Performance</span>
                    <button onclick="fetchAllData()" class="refresh-btn">Refresh</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>ID</th>
                                <th>XP</th>
                                <th>Hearts</th>
                                <th>Last Active</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="5" style="text-align:center;">Loading performance data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Column: Live Logs -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Event Streaming</span>
                </div>
                <div class="log-container" id="logContainer">
                    <div style="text-align:center; padding-top:2rem;">Loading event logs...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/api/health`);
                const data = await res.json();
                const badge = document.getElementById('healthStatus');
                const text = document.getElementById('statusText');
                
                if (data.success) {
                    badge.className = 'status-badge status-online';
                    text.innerText = 'Systems Operational';
                } else {
                    throw new Error('Database down');
                }
            } catch (e) {
                document.getElementById('healthStatus').className = 'status-badge status-offline';
                document.getElementById('statusText').innerText = 'Backend Error';
            }
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/api/admin/users`);
                const data = await res.json();
                const body = document.getElementById('userTableBody');
                
                if (data.users && data.users.length > 0) {
                    body.innerHTML = data.users.map(u => `
                        <tr>
                            <td>
                                <strong>${u.name || u.username}</strong><br>
                                <span style="font-size:0.75rem; color:var(--text-muted)">@${u.username}</span>
                            </td>
                            <td><span class="user-id">${u.studentId}</span></td>
                            <td><span style="color:var(--success); font-weight:600;">${u.xp}</span></td>
                            <td>${u.hearts} ❤️</td>
                            <td style="font-size:0.75rem; color:var(--text-muted)">
                                ${new Date(u.lastActive).toLocaleString()}
                            </td>
                        </tr>
                    `).join('');
                } else {
                    body.innerHTML = '<tr><td colspan="5" style="text-align:center;">No students found in RDS.</td></tr>';
                }
            } catch (e) {
                document.getElementById('userTableBody').innerHTML = `<tr><td colspan="5" style="color:var(--error); text-align:center;">Error fetching users.</td></tr>`;
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch(`${API_URL}/api/behaviours`);
                const data = await res.json();
                const container = document.getElementById('logContainer');
                
                if (data.behaviours && data.behaviours.length > 0) {
                    container.innerHTML = data.behaviours.map(l => `
                        <div class="log-item ${l.actionType}">
                            <div class="log-header">
                                <span class="log-name">${l.name}</span>
                                <span class="log-time">${new Date(l.timestamp).toLocaleTimeString()}</span>
                            </div>
                            <div style="margin-bottom:4px;">Action: <span style="color:var(--primary)">${l.actionType}</span></div>
                            <div class="log-meta">${JSON.stringify(l.metadata)}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="text-align:center; padding-top:2rem; opacity:0.5;">No events captured yet.</div>';
                }
            } catch (e) {
                document.getElementById('logContainer').innerHTML = `<div style="color:var(--error); text-align:center;">Log fetch failed.</div>`;
            }
        }

        function fetchAllData() {
            checkHealth();
            fetchUsers();
            fetchLogs();
        }

        // Initial Load
        fetchAllData();

        // Auto-refresh every 30 seconds
        setInterval(fetchAllData, 30000);
    </script>
</body>
</html>
