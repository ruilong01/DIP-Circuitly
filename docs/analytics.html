<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impulse | Live Developer Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { padding: 40px; background: #0f172a; color: white; }
        .container { max-width: 1200px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #3b82f6; }
        .stat-label { font-size: 0.9rem; opacity: 0.7; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(255,255,255,0.05); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-user { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge-admin { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .refresh-btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; float: right; }
        .refresh-btn:hover { background: #2563eb; }
        .api-link { color: #3b82f6; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <button class="refresh-btn" onclick="fetchData()">🔄 Refresh Live Data</button>
        <h1 class="brand-title" style="margin-bottom: 10px;">Developer Analytics ⚡</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">Live feed from AWS RDS: <span id="api-url" class="api-link"></span></p>

        <div class="stats-grid">
            <div class="stat-card">
                <div id="total-users" class="stat-value">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div id="total-xp" class="stat-value">0</div>
                <div class="stat-label">Accumulated XP</div>
            </div>
            <div class="stat-card">
                <div id="avg-time" class="stat-value">0m</div>
                <div class="stat-label">Avg. Time/User</div>
            </div>
            <div class="stat-card">
                <div id="active-today" class="stat-value">0</div>
                <div class="stat-label">Active Today</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>User / ID</th>
                    <th>Group</th>
                    <th>XP</th>
                    <th>Time Spent</th>
                    <th>Last Active</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="user-table">
                <!-- Data populated via JS -->
            </tbody>
        </table>
    </div>

    <script src="js/config.js"></script>
    <script>
        document.getElementById('api-url').textContent = window.CONFIG.API_BASE_URL + '/api/users';

        async function fetchData() {
            try {
                const res = await fetch(`${window.CONFIG.API_BASE_URL}/api/users`);
                const data = await res.json();
                if (data.success) {
                    renderDashboard(data.users);
                }
            } catch (e) {
                console.error("Fetch failed", e);
                alert("Failed to connect to AWS Backend. Ensure the server is running.");
            }
        }

        function renderDashboard(users) {
            const tbody = document.getElementById('user-table');
            tbody.innerHTML = '';

            let totalXP = 0;
            let totalTime = 0;
            let activeToday = 0;
            const today = new Date().toLocaleDateString();

            users.forEach(u => {
                totalXP += u.xp;
                const timeSec = Object.values(u.topicProgress || {}).reduce((acc, curr) => acc + (curr.time || 0), 0);
                const timeMin = Math.round(timeSec / 60);
                totalTime += timeMin;

                const lastActive = u.lastActive ? new Date(u.lastActive) : null;
                if (lastActive && lastActive.toLocaleDateString() === today) {
                    activeToday++;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight:700;">${u.name}</div>
                        <div style="font-size:0.8rem; opacity:0.6;">${u.studentId} @${u.username}</div>
                    </td>
                    <td>${u.classGroup || 'N/A'}</td>
                    <td style="color:#3b82f6; font-weight:800;">${u.xp.toLocaleString()}</td>
                    <td>${timeMin}m</td>
                    <td style="font-size:0.85rem; opacity:0.7;">${lastActive ? lastActive.toLocaleString() : 'Never'}</td>
                    <td><span class="badge badge-${u.role}">${u.role.toUpperCase()}</span></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('total-users').textContent = users.length;
            document.getElementById('total-xp').textContent = totalXP.toLocaleString();
            document.getElementById('avg-time').textContent = users.length ? Math.round(totalTime / users.length) + 'm' : '0m';
            document.getElementById('active-today').textContent = activeToday;
        }

        fetchData();
        // Auto refresh every 60 seconds
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
